# Production stack for privy-embedded-wallet monitors.
# ESC key `privy-embedded-wallet` exists in shared-infra/incident with EP + Slack channel.
#
# Note: disablePaging/disableSlack are set in both the ESC environment
# (esc/privy-embedded-wallet.yaml) and here. The ESC value applies by default;
# the stack value here is a per-environment override. Re-enable in both places
# once thresholds have been validated against real prod traffic.
environment:
  - datadog-cloud-universe/privy-embedded-wallet
config:
  datadog-cloud-universe:environment: prod
  datadog-cloud-universe:tagFilter: "(unienv:prod OR env:prod)"
  datadog-cloud-universe:incidentWebhook: "@webhook-Incident-io"
  datadog-cloud-universe:disablePaging: "true"
  datadog-cloud-universe:disableSlack: "true"
