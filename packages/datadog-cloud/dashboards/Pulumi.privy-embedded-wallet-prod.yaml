# Production dashboards stack for privy-embedded-wallet
#
# Stack: privy-embedded-wallet-prod
# ESC: datadog-dashboards-universe/shared

environment:
  - datadog-dashboards-universe/shared
config:
  datadog-dashboards-universe:environment: prod
  datadog-dashboards-universe:tagFilter: "(unienv:prod OR env:prod)"
  datadog-dashboards-universe:defaultTeam: privy-embedded-wallet
