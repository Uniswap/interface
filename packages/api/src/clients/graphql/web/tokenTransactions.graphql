
query V4TokenTransactions($chain: Chain!, $address: String!, $first: Int!, $cursor: Int, $multichain: Boolean = false) {
  token(chain: $chain, address: $address) {
    ...TransactionToken
    v4Transactions(first: $first, timestampCursor: $cursor, multichain: $multichain) {
      ...PoolTx
    }
  }
}
