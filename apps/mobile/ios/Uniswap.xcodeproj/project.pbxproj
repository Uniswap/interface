			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\n\n# Skip in debug configs\nif [ \"$CONFIGURATION\" = \"Debug\" ] || [ \"$CONFIGURATION\" = \"DebugOptimized\" ]; then\n  echo \"warning: Skipping Datadog upload in $CONFIGURATION\"\n  exit 0\nfi\n\nWITH_ENVIRONMENT=\"../../../node_modules/react-native/scripts/xcode/with-environment.sh\"\nREACT_NATIVE_XCODE=\"./sourcemaps-datadog.sh\"\n\nexport SOURCEMAP_FILE=$DERIVED_FILE_DIR/main.jsbundle.map\n\nif [[ -n \"$DATADOG_API_KEY\" && \"$SKIP_DATADOG_UPLOAD\" != \"true\" ]]; then\n  echo \"warning: Starting Datadog Uploads\"\n  echo \"warning: Build Configuration: $CONFIGURATION\"\n  echo \"warning: Product Name: $PRODUCT_NAME\"\n  echo \"warning: Source Map File: $SOURCEMAP_FILE\"\n  echo \"warning: dSYM Path: $DWARF_DSYM_FOLDER_PATH\"\n  echo \"\"\n\n  # JS source maps\n  echo \"warning: Uploading JS source maps...\"\n  \n  /bin/sh -c \"$WITH_ENVIRONMENT $REACT_NATIVE_XCODE\"\n\n  echo \"warning: \"\n\n  # iOS dSYM\n  echo \"warning: Uploading iOS dSYMs...\"\n  echo \"warning: dSYM command: datadog-ci dsyms upload $DWARF_DSYM_FOLDER_PATH\"\n\n  DSYM_LOG=$(mktemp)\n  if ../../../node_modules/.bin/datadog-ci dsyms upload $DWARF_DSYM_FOLDER_PATH 2>&1 | tee \"$DSYM_LOG\"; then\n    echo \"warning: dSYM upload completed successfully\"\n    rm -f \"$DSYM_LOG\"\n  else\n    DSYM_EXIT_CODE=$?\n    echo \"warning: \"\n    echo \"warning: dSYM Upload Failed\"\n    echo \"warning: Exit Code: $DSYM_EXIT_CODE\"\n    echo \"warning: \"\n    echo \"warning:Full Error Output:\"\n    echo \"warning: ---\"\n    echo \"warning: $(cat \"$DSYM_LOG\")\"\n    echo \"warning: ---\"\n    echo \"warning: \"\n    echo \"warning: Debug Information:\"\n    echo \"warning:   - datadog-ci version: $(../../../node_modules/.bin/datadog-ci version 2>&1 || echo 'Failed to get version')\"\n    echo \"warning:   - dSYM folder exists: $([ -d \\\"$DWARF_DSYM_FOLDER_PATH\\\" ] && echo 'Yes' || echo 'No')\"\n    echo \"warning:   - dSYM contents: $(ls -la \\\"$DWARF_DSYM_FOLDER_PATH\\\" 2>&1 || echo 'Failed to list')\"\n    echo \"warning:   - DATADOG_API_KEY set: $([ -n \\\"$DATADOG_API_KEY\\\" ] && echo 'Yes (${#DATADOG_API_KEY} chars)' || echo 'No')\"\n    echo \"warning:   - Working directory: $(pwd)\"\n    echo \"warning: \"\n    echo \"warning: This is non-critical. Build will continue.\"\n    rm -f \"$DSYM_LOG\"\n  fi\n\n  echo \"warning: \"\n  echo \"warning: Datadog upload phase completed (build continues regardless of upload status)\"\nelse\n  echo \"warning: Skipping Datadog upload (DATADOG_API_KEY not set or SKIP_DATADOG_UPLOAD=true)\"\nfi\n\n# Always exit 0 to not fail the build\nexit 0\n";
