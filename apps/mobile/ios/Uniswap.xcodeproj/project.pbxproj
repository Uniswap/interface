\" 2>&1 || echo 'Failed to list')\"\n    echo \"warning:   - DATADOG_API_KEY set: $([ -n \\\"$DATADOG_API_KEY\\\" ] && echo 'Yes (${#DATADOG_API_KEY} chars)' || echo 'No')\"\n    echo \"warning:   - Working directory: $(pwd)\"\n    echo \"warning: \"\n    echo \"warning: This is non-critical. Build will continue.\"\n    rm -f \"$DSYM_LOG\"\n  fi\n\n  echo \"warning: \"\n  echo \"warning: Datadog upload phase completed (build continues regardless of upload status)\"\nelse\n  echo \"warning: Skipping Datadog upload (DATADOG_API_KEY not set or SKIP_DATADOG_UPLOAD=true)\"\nfi\n\n# Always exit 0 to not fail the build\nexit 0\n";
